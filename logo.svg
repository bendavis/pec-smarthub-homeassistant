<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>

    <!-- Energy Bolt Gradient (Cyan to Emerald) -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Accent Glow Gradient -->
    <linearGradient id="glowGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.2" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="25" result="blur" />
    </filter>
  </defs>

  <!-- Background Base (Squircle/Rounded Rect) -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgGrad)" stroke="#374151" stroke-width="4" />

  <!-- Ambient Glow Behind Elements -->
  <circle cx="256" cy="256" r="140" fill="url(#glowGrad)" filter="url(#softGlow)" />

  <!-- Grid Circles (SmartHub Concept) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#374151" stroke-width="2" stroke-dasharray="8,8" opacity="0.6" />
  <circle cx="256" cy="256" r="130" fill="none" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="4,6" opacity="0.4" />

  <!-- Orbiting Data Nodes -->
  <circle cx="256" cy="76" r="8" fill="#38bdf8" filter="url(#glow)" />
  <circle cx="130" cy="380" r="6" fill="#10b981" filter="url(#glow)" />
  <circle cx="382" cy="380" r="7" fill="#f59e0b" filter="url(#glow)" />

  <!-- The Smart Home Silhouette -->
  <!-- Roof -->
  <path d="M 136 260 L 256 150 L 376 260" fill="none" stroke="#f3f4f6" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  <!-- Walls / Floor -->
  <path d="M 166 260 L 166 390 C 166 396 170 400 176 400 L 336 400 C 342 400 346 396 346 390 L 346 260" fill="none" stroke="#f3f4f6" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />

  <!-- Central Electric Lightning Bolt (PEC Power) -->
  <path d="M 276 180 L 216 290 L 260 290 L 236 380 L 296 270 L 252 270 Z" fill="url(#boltGrad)" filter="url(#glow)" />

  <!-- Circular Border Highlight -->
  <rect x="24" y="24" width="464" height="464" rx="100" fill="none" stroke="#4b5563" stroke-width="1" opacity="0.5" />
</svg>
